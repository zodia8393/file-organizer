# /workspace 전용 정리 규칙
# .workspace-map.json 거버넌스 정책과 동기화
#
# 핵심 원칙:
#   - /workspace 루트에 떠도는 파일(orphan) → _inbox/ 로 이동
#   - prj_*, app_*, _personal, _archive, .claude/ 등 기존 구조는 절대 안 건드림
#   - _inbox 내 오래된 파일(30일+) → _archive/ 이동 제안
#   - depth 1만 스캔 (프로젝트 내부 진입 금지)

settings:
  scopes:
    - "/workspace"

  # depth 최대: exclude_dirs가 프로젝트 내부 진입을 막으므로 안전
  max_depth: 99

  cooldown_minutes: 30
  batch_limit: 100

  exclude_dirs:
    # 프로젝트 디렉토리 (절대 불가침)
    - "prj_"
    - "app_"
    - "_archive"
    - "_personal"
    - "_inbox"
    - "scripts"
    # 시스템/설정
    - ".claude"
    - ".git"
    - "node_modules"
    - "__pycache__"
    - ".cache"
    - ".venv"
    - "venv"

  # 루트에 있어야 하는 보호 파일 (이동하지 않음)
  exclude_files:
    - "CLAUDE.md"
    - "README.md"
    - ".env"
    - ".gitignore"
    - ".workspace-map.json"
    - ".mcp.json"

  log_retention_days: 30

rules:
  # --- 루트 orphan 파일 → _inbox/ ---
  - name: "PPT/발표자료 → _inbox"
    match:
      extensions: [".pptx", ".ppt"]
    destination: "_inbox/"

  - name: "이미지 파일 → _inbox"
    match:
      extensions: [".png", ".jpg", ".jpeg", ".gif", ".bmp", ".svg"]
    destination: "_inbox/"

  - name: "PDF 문서 → _inbox"
    match:
      extensions: [".pdf"]
    destination: "_inbox/"

  - name: "Office 문서 → _inbox"
    match:
      extensions: [".doc", ".docx", ".xls", ".xlsx", ".hwp", ".hwpx"]
    destination: "_inbox/"

  - name: "스크립트 파일 → _inbox"
    match:
      extensions: [".py", ".sh", ".bash"]
    destination: "_inbox/"

  - name: "설정/데이터 파일 → _inbox"
    match:
      extensions: [".json", ".yaml", ".yml", ".csv", ".tsv"]
    destination: "_inbox/"

  - name: "압축 파일 → _inbox"
    match:
      extensions: [".zip", ".tar.gz", ".tar.zst", ".rar", ".7z", ".zst"]
    destination: "_inbox/"

  - name: "로그/임시 파일 → trash"
    match:
      name_regex: "^(temp|tmp|~\\$|\\.~)"
    action: "trash"
